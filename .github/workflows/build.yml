name: build

on: [push, pull_request]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: checkout
      uses: actions/checkout@v4
    - name: install eigen3
      run: sudo apt-get install libeigen3-dev
    - name: cmake
      run: mkdir build && cd build && cmake -DCMAKE_CXX_FLAGS="-Wall -Werror" -DLATTICE_BUILD_TESTS=ON ..
    - name: make
      run: cd build && make
    - name: ctest
      run: cd build && ctest -V

  rust-xml-smoke:

    runs-on: ubuntu-latest

    steps:
    - name: checkout
      uses: actions/checkout@v4
    - name: install eigen3
      run: sudo apt-get install -y libeigen3-dev
    - name: configure rust xml
      run: cmake -S . -B build-rustxml -DLATTICE_BUILD_TESTS=ON
    - name: build rust xml smoke
      run: cmake --build build-rustxml --target test_rust_xml_bridge
    - name: run rust xml smoke
      run: cd build-rustxml/test && ./rust_xml_bridge
    - name: cargo test
      run: cargo test
