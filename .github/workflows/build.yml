name: build

on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: checkout
      uses: actions/checkout@v6
    - name: install eigen3
      run: sudo apt-get install libeigen3-dev
    - name: cmake
      run: mkdir build && cd build && cmake -DCMAKE_CXX_FLAGS="-Wall -Werror" -DLATTICE_BUILD_TESTS=ON ..
    - name: make
      run: cd build && make
    - name: ctest
      run: cd build && ctest -V

  rust-xml-smoke:

    runs-on: ubuntu-latest

    steps:
    - name: checkout
      uses: actions/checkout@v6
    - name: install eigen3
      run: sudo apt-get install -y libeigen3-dev
    - name: configure rust xml
      run: cmake -S . -B build-rustxml -DLATTICE_BUILD_TESTS=ON
    - name: build rust xml smoke
      run: cmake --build build-rustxml --target test_rust_xml_bridge
    - name: run rust xml smoke
      run: cd build-rustxml/test && ./rust_xml_bridge
    - name: cargo test
      run: cargo test

  python-bindings:

    runs-on: ubuntu-latest

    steps:
    - name: checkout
      uses: actions/checkout@v6
    - name: setup python
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"
    - name: create virtualenv
      run: python -m venv .venv
    - name: install python build tools
      run: .venv/bin/python -m pip install maturin numpy
    - name: check python crate
      run: cargo check -p lattice-python
    - name: install python bindings
      run: .venv/bin/python -m maturin develop
    - name: run python tests
      run: .venv/bin/python -m unittest discover -s python/tests
